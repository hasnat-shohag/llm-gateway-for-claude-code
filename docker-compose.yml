services:
  # Development: source is bind-mounted; providers.json hot-reloads in-app via
  # watchProviders. We deliberately DON'T use `node --watch`: it parks on an
  # uncaught crash instead of exiting, which blocks Docker's restart policy from
  # recovering the process. Plain `node` exits on crash so `restart` kicks in.
  # (Code edits need a `docker compose restart gateway-dev` — --watch didn't
  # reliably pick up bind-mount changes anyway.)
  gateway-dev:
    build:
      context: .
      target: dev
    image: llm-gateway:dev
    command: ["node", "--import", "tsx", "src/index.ts"]
    env_file:
      - .env
    environment:
      NODE_ENV: development
      USAGE_DB_PATH: /app/data/usage.db
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # Live-mount code + config so local edits reflect in the container.
      - ./src:/app/src
      - ./providers.json:/app/providers.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./package.json:/app/package.json
      # Keep the image's node_modules; don't let an empty host dir shadow it.
      - /app/node_modules
      # Persist usage.db across container restarts
      - usage-data:/app/data
    restart: unless-stopped

  # Production: immutable build, no bind mounts. Enable with:
  #   docker compose --profile prod up gateway
  gateway:
    build:
      context: .
      target: production
    image: llm-gateway:latest
    profiles: ["prod"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # Mount providers.json read-only so it can still be hot-reloaded on edit.
      - ./providers.json:/app/providers.json:ro
      # Persist usage.db across container restarts and redeployments
      - usage-data:/app/data
    restart: unless-stopped

volumes:
  # Named volume for SQLite usage database — survives container restarts/rebuilds.
  # Inspect with: docker volume inspect llm-gateway_usage-data
  usage-data:

